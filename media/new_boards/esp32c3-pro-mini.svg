<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="ESP32-C3 Pro Mini board">
  <defs>
    <linearGradient id="pcb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b3c"/>
      <stop offset="100%" style="stop-color:#0d4a28"/>
    </linearGradient>
  </defs>
  <rect x="8" y="22" width="104" height="76" rx="6" fill="url(#pcb)" stroke="#0a3d22" stroke-width="2"/>
  <!-- USB-C connector -->
  <rect x="48" y="92" width="24" height="14" rx="3" fill="#2a2a2a" stroke="#111" stroke-width="1"/>
  <rect x="52" y="96" width="16" height="6" rx="1" fill="#444"/>
  <!-- Main module outline -->
  <rect x="28" y="32" width="64" height="48" rx="4" fill="#0f2d1a" stroke="#1e5c36" stroke-width="1"/>
  <!-- Chip -->
  <rect x="44" y="44" width="32" height="28" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="60" y="62" text-anchor="middle" fill="#6cf0a0" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="700">C3</text>
  <!-- Pin hints -->
  <g fill="#c9e6d0" opacity="0.85">
    <circle cx="18" cy="38" r="2"/><circle cx="18" cy="48" r="2"/><circle cx="18" cy="58" r="2"/>
    <circle cx="102" cy="38" r="2"/><circle cx="102" cy="48" r="2"/><circle cx="102" cy="58" r="2"/>
  </g>
  <!-- LED -->
  <circle cx="60" cy="36" r="3" fill="#ffcc00" stroke="#b8860b" stroke-width="0.5"/>
  <text x="60" y="18" text-anchor="middle" fill="#4e7cff" font-family="system-ui,Segoe UI,sans-serif" font-size="9" font-weight="600">ESP32-C3</text>
</svg>
